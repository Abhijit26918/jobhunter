profile:
  cv_path: cv.md

search:
  must_have: [data, machine learning, ml, python, analyst]   # >=1 must appear
  nice_to_have: [fraud, risk, fintech, sql, pytorch, intern, anomaly, credit, model]
  exclude: [senior, staff, principal, lead, manager, "5+ years", "7+ years", clearance]
  remote_only: true
  max_age_days: 30
  countries: [in, gb, us, remote]

sources:
  remoteok:   { enabled: true }
  remotive:   { enabled: true }
  arbeitnow:  { enabled: true }
  jobicy:     { enabled: true, tag: data }
  adzuna:     { enabled: false, queries: ["machine learning", "data scientist intern", "ml intern"] }  # add ADZUNA_APP_ID/APP_KEY to .env, then set enabled: true
  greenhouse: { enabled: false, boards: [] }   # add company board slugs to enable, e.g. [stripe, ramp]
  lever:      { enabled: false, companies: [] } # add company slugs to enable
  ashby:      { enabled: false, orgs: [] }       # add org slugs to enable
  hackernews: { enabled: false }

match:
  top_n_display: 15
  daily_llm_budget: 8

tailor:
  max_revisions: 1
  min_acceptable_score: 7
